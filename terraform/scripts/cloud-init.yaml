#cloud-config

apt:
  sources:
    pgdg.list:
      source: "deb [signed-by=$KEY_FILE] https://apt.postgresql.org/pub/repos/apt jammy-pgdg main"
      keyid: B97B0AFCAA1A47F044F244A07FCC7D46ACCC4CF8
      keyserver: keyserver.ubuntu.com

packages:
  - python3
  - python3-pip
  - python3-venv
  - git
  - postgresql-client-16
  - awscli

write_files:
  - path: /etc/systemd/system/learningsteps.service
    content: |
      [Unit]
      Description=LearningSteps API
      After=network.target

      [Service]
      Type=simple
      WorkingDirectory=/opt/learningsteps/api
      EnvironmentFile=/etc/learningsteps/db.env
      ExecStart=/opt/learningsteps/venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000
      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

runcmd:
  - mkdir -p /etc/learningsteps
  - >
    DB_PASSWORD=$(aws secretsmanager get-secret-value
    --secret-id ${secret_name} --region ${aws_region}
    --query SecretString --output text)
  - echo "DATABASE_URL=postgresql://${db_admin_username}:$DB_PASSWORD@${db_host}/${db_name}?sslmode=require" > /etc/learningsteps/db.env
  - chmod 600 /etc/learningsteps/db.env
  - git clone https://github.com/CyberstepsDE/learningsteps.git /opt/learningsteps
  - python3 -m venv /opt/learningsteps/venv
  - /opt/learningsteps/venv/bin/pip install --upgrade pip -q
  - /opt/learningsteps/venv/bin/pip install -r /opt/learningsteps/api/requirements.txt -q
  - until psql "$(grep DATABASE_URL /etc/learningsteps/db.env | cut -d= -f2-)" -c '\q' 2>/dev/null; do sleep 5; done
  - psql "$(grep DATABASE_URL /etc/learningsteps/db.env | cut -d= -f2-)" -f /opt/learningsteps/database_setup.sql
  - systemctl daemon-reload
  - systemctl enable learningsteps
  - systemctl start learningsteps
  - curl -fsSL https://raw.githubusercontent.com/VladvonTranssylvanien/learningsteps-lockdown-on-AWS/main/terraform/scripts/setup-npmplus.sh -o /tmp/setup-npmplus.sh
  - bash /tmp/setup-npmplus.sh
  - curl -fsSL https://raw.githubusercontent.com/VladvonTranssylvanien/learningsteps-lockdown-on-AWS/main/terraform/scripts/setup-json-logging.sh -o /tmp/setup-json-logging.sh
  - bash /tmp/setup-json-logging.sh
  - curl -fsSL https://raw.githubusercontent.com/VladvonTranssylvanien/learningsteps-lockdown-on-AWS/main/terraform/scripts/setup-cloudwatch-logging.sh -o /tmp/setup-cloudwatch-logging.sh
  - sed -i "s|\${log_group_name}|${log_group_name}|" /tmp/setup-cloudwatch-logging.sh
  - bash /tmp/setup-cloudwatch-logging.sh